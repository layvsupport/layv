<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />

    <script src="./src/js/RealGlass.standalone.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="AI 서비스 목록">
        <!-- LAYV 로고 및 타이틀 -->

              </svg>
            </div>
            <h1 class="sidebar__title">LAYV</h1>
          </div>
          <button type="button" class="sidebar__toggle" id="sidebar-toggle" title="사이드바 접기/펼치기" aria-label="사이드바 토글">
            <span class="sidebar__toggle-icon material-symbols-outlined">keyboard_double_arrow_left</span>
          </button>
        </div>

        <!-- 앱 폴더 토글 헤더 -->
        <button type="button" class="sidebar__folder-toggle" id="apps-folder-toggle" aria-expanded="true">
          <span class="sidebar__folder-arrow material-symbols-outlined">arrow_forward_ios</span>
          <span class="sidebar__folder-icon material-symbols-outlined">folder</span>
          <span class="sidebar__folder-name">Apps</span>
        </button>
        
        <nav class="sidebar__apps-wrapper" id="apps-wrapper" aria-label="AI 아이콘">
          <button class="sidebar__apps-settings" aria-label="설정">
            <svg width="14" height="14" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
              <path d="m1080.7 730.97-57.516-35.719c-70.641-43.828-70.641-146.63 0-190.45l57.562-35.719c29.344-18.188 38.344-56.766 20.156-86.062l-84.141-135.52c-18.188-29.344-56.766-38.344-86.062-20.156l-17.156 10.641c-74.672 46.359-171.19-7.3594-171.19-95.25v-20.203c0-34.547-27.984-62.531-62.531-62.531h-159.52c-34.547 0-62.531 27.984-62.531 62.531v20.203c0 87.891-96.562 141.61-171.19 95.25l-17.156-10.641c-29.344-18.188-67.875-9.1875-86.062 20.156l-84.141 135.52c-18.188 29.344-9.1875 67.875 20.156 86.062l57.516 35.719c70.641 43.828 70.641 146.63 0 190.45l-57.516 35.719c-29.344 18.188-38.344 56.766-20.156 86.062l84.141 135.52c18.188 29.344 56.766 38.344 86.062 20.156l17.156-10.641c74.672-46.359 171.19 7.3594 171.19 95.25v20.203c0 34.547 27.984 62.531 62.531 62.531h159.52c34.547 0 62.531-27.984 62.531-62.531v-20.203c0-87.891 96.516-141.61 171.19-95.25l17.156 10.641c29.344 18.188 67.875 9.1875 86.062-20.156l84.141-135.52c18.188-29.344 9.1875-67.875-20.156-86.062zm-480.71 64.312c-107.86 0-195.28-87.422-195.28-195.28 0-107.86 87.422-195.28 195.28-195.28s195.28 87.422 195.28 195.28c0 107.86-87.422 195.28-195.28 195.28z"/>
            </svg>
          </button>
          <div class="sidebar__apps" id="ai-app-list"></div>
        </nav>

        <!-- Community 폴더 -->
        <button type="button" class="sidebar__folder-toggle sidebar__folder-toggle--collapsed" id="community-folder-toggle" aria-expanded="false">
          <span class="sidebar__folder-arrow material-symbols-outlined">arrow_forward_ios</span>
          <span class="sidebar__folder-icon material-symbols-outlined">box</span>
          <span class="sidebar__folder-name">Community</span>
        </button>
        
        <nav class="sidebar__apps-wrapper sidebar__apps-wrapper--collapsed sidebar__apps-wrapper--empty" id="community-wrapper" aria-label="커뮤니티">
          <button class="sidebar__apps-settings" aria-label="설정">
            <svg width="14" height="14" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
              <path d="m1080.7 730.97-57.516-35.719c-70.641-43.828-70.641-146.63 0-190.45l57.562-35.719c29.344-18.188 38.344-56.766 20.156-86.062l-84.141-135.52c-18.188-29.344-56.766-38.344-86.062-20.156l-17.156 10.641c-74.672 46.359-171.19-7.3594-171.19-95.25v-20.203c0-34.547-27.984-62.531-62.531-62.531h-159.52c-34.547 0-62.531 27.984-62.531 62.531v20.203c0 87.891-96.562 141.61-171.19 95.25l-17.156-10.641c-29.344-18.188-67.875-9.1875-86.062 20.156l-84.141 135.52c-18.188 29.344-9.1875 67.875 20.156 86.062l57.516 35.719c70.641 43.828 70.641 146.63 0 190.45l-57.516 35.719c-29.344 18.188-38.344 56.766-20.156 86.062l84.141 135.52c18.188 29.344 56.766 38.344 86.062 20.156l17.156-10.641c74.672-46.359 171.19 7.3594 171.19 95.25v20.203c0 34.547 27.984 62.531 62.531 62.531h159.52c34.547 0 62.531-27.984 62.531-62.531v-20.203c0-87.891 96.516-141.61 171.19-95.25l17.156 10.641c29.344 18.188 67.875 9.1875 86.062-20.156l84.141-135.52c18.188-29.344 9.1875-67.875-20.156-86.062zm-480.71 64.312c-107.86 0-195.28-87.422-195.28-195.28 0-107.86 87.422-195.28 195.28-195.28s195.28 87.422 195.28 195.28c0 107.86-87.422 195.28-195.28 195.28z"/>
            </svg>
          </button>
          <div class="sidebar__apps" id="community-list"></div>
        </nav>

        <!-- My Pack 폴더 -->
        <button type="button" class="sidebar__folder-toggle sidebar__folder-toggle--collapsed" id="mypack-folder-toggle" aria-expanded="false">
          <span class="sidebar__folder-arrow material-symbols-outlined">arrow_forward_ios</span>
          <span class="sidebar__folder-icon material-symbols-outlined">box</span>
          <span class="sidebar__folder-name">My Pack</span>
        </button>
        
        <nav class="sidebar__apps-wrapper sidebar__apps-wrapper--collapsed sidebar__apps-wrapper--empty" id="mypack-wrapper" aria-label="마이 팩">
          <button class="sidebar__apps-settings" aria-label="설정">
            <svg width="14" height="14" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
              <path d="m1080.7 730.97-57.516-35.719c-70.641-43.828-70.641-146.63 0-190.45l57.562-35.719c29.344-18.188 38.344-56.766 20.156-86.062l-84.141-135.52c-18.188-29.344-56.766-38.344-86.062-20.156l-17.156 10.641c-74.672 46.359-171.19-7.3594-171.19-95.25v-20.203c0-34.547-27.984-62.531-62.531-62.531h-159.52c-34.547 0-62.531 27.984-62.531 62.531v20.203c0 87.891-96.562 141.61-171.19 95.25l-17.156-10.641c-29.344-18.188-67.875-9.1875-86.062 20.156l-84.141 135.52c-18.188 29.344-9.1875 67.875 20.156 86.062l57.516 35.719c70.641 43.828 70.641 146.63 0 190.45l-57.516 35.719c-29.344 18.188-38.344 56.766-20.156 86.062l84.141 135.52c18.188 29.344 56.766 38.344 86.062 20.156l17.156-10.641c74.672-46.359 171.19 7.3594 171.19 95.25v20.203c0 34.547 27.984 62.531 62.531 62.531h159.52c34.547 0 62.531-27.984 62.531-62.531v-20.203c0-87.891 96.516-141.61 171.19-95.25l17.156 10.641c29.344 18.188 67.875 9.1875 86.062-20.156l84.141-135.52c18.188-29.344 9.1875-67.875-20.156-86.062zm-480.71 64.312c-107.86 0-195.28-87.422-195.28-195.28 0-107.86 87.422-195.28 195.28-195.28s195.28 87.422 195.28 195.28c0 107.86-87.422 195.28-195.28 195.28z"/>
            </svg>
          </button>
          <div class="sidebar__apps" id="mypack-list"></div>
        </nav>

        <!-- 마이 페이지 버튼 -->
        <button type="button" class="sidebar__mypage" id="mypage-button" aria-label="마이 페이지">
          <div class="sidebar__mypage-avatar">
            <span>U</span>
          </div>
          <span class="sidebar__mypage-name">MyPage</span>
          <span class="sidebar__mypage-arrow material-symbols-outlined">arrow_forward_ios</span>
        </button>
      </aside>

      <main class="workspace" aria-live="polite">
        <header class="workspace__topbar">
          <div class="workspace__tabs">
            <div class="workspace__tabs-list" id="canvas-tabs" role="tablist"></div>
            <button type="button" class="workspace__tabs-add" id="add-canvas-btn" title="새 캔버스 추가">+</button>
          </div>
          <div class="workspace__controls">
            <button type="button" class="help-button" id="help-button" title="도움말" aria-label="도움말">
              <span class="help-button__icon">?</span>
            </button>
          </div>
        </header>

        <section class="workspace__canvas" id="workspace-canvas" tabindex="0"></section>
        
        <!-- 통합 플로팅 컨트롤 -->
        <div class="floating-control" id="floating-control">
          <div class="floating-control__wrapper">
            <textarea
              id="unified-input"
              class="floating-control__textarea"
              placeholder="/c (빠른 실행) 또는 프롬프트 입력 (일괄 전송)..."
              rows="1"
            ></textarea>
            <button type="button" id="send-btn" class="floating-control__send-btn">
              <span class="floating-control__send-icon">📤</span>
              <span class="floating-control__send-text">Send</span>
            </button>
          </div>
        </div>
      </main>
    </div>

    <template id="window-template">
      <article class="ai-window" role="group">
        <header class="ai-window__header">
          <div class="ai-window__meta">
            <span class="ai-window__icon"></span>
            <div class="ai-window__info">
              <strong class="ai-window__title"></strong>
              <span class="ai-window__subtitle">실시간 제어</span>
            </div>
          </div>
          <div class="ai-window__actions">
            <label class="ai-window__toggle" title="일괄 프롬프트 수신">
              <input type="checkbox" class="ai-window__toggle-input" data-action="toggle-prompt" checked />
              <span class="ai-window__toggle-indicator"></span>
            </label>
            <button class="ai-window__action" data-action="refresh" title="새로고침">
              <span aria-hidden="true">⟳</span>
            </button>
            <button class="ai-window__action" data-action="close" title="닫기">
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </header>
        <div class="ai-window__content" data-frame-container></div>
        <div class="ai-window__resize-handle" data-resize-handle aria-hidden="true"></div>
      </article>
    </template>

    <!-- 커스텀 앱 추가 팝업 -->
    <div class="custom-app-modal" id="custom-app-modal" style="display: none;">
      <div class="custom-app-modal__overlay"></div>
      <div class="custom-app-modal__content">
        <div class="custom-app-modal__header">
          <h2 class="custom-app-modal__title">커스텀 앱 추가</h2>
          <button class="custom-app-modal__close" id="modal-close-btn" aria-label="닫기">×</button>
        </div>
        <form class="custom-app-modal__form" id="custom-app-form">
          <div class="custom-app-modal__field">
            <label for="app-name">앱 이름</label>
            <input type="text" id="app-name" name="name" placeholder="예: YouTube" required>
          </div>
          <div class="custom-app-modal__field">
            <label for="app-url">URL</label>
            <input type="url" id="app-url" name="url" placeholder="https://example.com" required>
          </div>
          <div class="custom-app-modal__field">
            <label>아이콘</label>
            <div class="custom-app-modal__icon-options">
              <div class="custom-app-modal__icon-option">
                <input type="radio" id="icon-text" name="icon-type" value="text" checked>
                <label for="icon-text">
                  <span>텍스트 (2글자)</span>
                  <input type="text" id="app-icon-text" name="icon-text" placeholder="YT" maxlength="2" pattern="[A-Za-z0-9]{1,2}">
                </label>
              </div>
              <div class="custom-app-modal__icon-option">
                <input type="radio" id="icon-image" name="icon-type" value="image">
                <label for="icon-image">
                  <span>이미지 파일</span>
                  <input type="file" id="app-icon-image" name="icon-image" accept="image/*">
                </label>
              </div>
            </div>
          </div>
          <div class="custom-app-modal__actions">
            <button type="button" class="custom-app-modal__cancel" id="modal-cancel-btn">취소</button>
            <button type="submit" class="custom-app-modal__submit">추가</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 프로필 설정 팝업 -->
    <div class="profile-modal" id="profile-modal" style="display: none;">
      <div class="profile-modal__overlay"></div>
      <div class="profile-modal__content">
        <div class="profile-modal__header">
          <h2 class="profile-modal__title">프로필 설정</h2>
          <button class="profile-modal__close" id="profile-modal-close-btn" aria-label="닫기">×</button>
        </div>
        <form class="profile-modal__form" id="profile-form">
          <div class="profile-modal__avatar-section">
            <div class="profile-modal__avatar-preview" id="profile-avatar-preview">
              U
            </div>
            <div class="profile-modal__avatar-actions">
              <label for="profile-avatar-upload" class="profile-modal__upload-btn">
                이미지 업로드
                <input type="file" id="profile-avatar-upload" accept="image/*" style="display: none;">
              </label>
              <button type="button" class="profile-modal__remove-btn" id="profile-avatar-remove">제거</button>
            </div>
          </div>
          <div class="profile-modal__field">
            <label for="profile-name">이름</label>
            <input type="text" id="profile-name" name="name" placeholder="사용자 이름" required maxlength="20">
          </div>
          <div class="profile-modal__actions">
            <button type="button" class="profile-modal__cancel" id="profile-modal-cancel-btn">취소</button>
            <button type="submit" class="profile-modal__submit">저장</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 라이선스 입력 모달 -->
    <div class="license-modal" id="license-modal" style="display: none;">
      <div class="license-modal__overlay"></div>
      <div class="license-modal__content">
        <div class="license-modal__header">
          <h2 class="license-modal__title">라이선스 키 입력</h2>
        </div>
        <form class="license-modal__form" id="license-form">
          <div class="license-modal__field">
            <label for="license-key">라이선스 키</label>
            <input 
              type="text" 
              id="license-key" 
              name="licenseKey" 
              placeholder="XXXX-XXXX-XXXX-XXXX" 
              required
              autocomplete="off"
              maxlength="19"
            >
            <p class="license-modal__hint">구매 시 받은 라이선스 키를 입력하세요.</p>
          </div>
          <div class="license-modal__message" id="license-message"></div>
          <div class="license-modal__actions">
            <button type="submit" class="license-modal__submit" id="license-submit-btn">인증</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./src/js/app.js"></script>
    <script type="module" src="./src/js/realglass-init.js"></script>
  </body>
</html>
